name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SKILL.md line count (max 500 per skill)
        run: |
          failed=0
          for skill_file in skills/*/SKILL.md; do
            lines=$(wc -l < "$skill_file")
            echo "$skill_file: $lines lines"
            if [ "$lines" -gt 500 ]; then
              echo "FAIL: $skill_file exceeds 500-line limit ($lines lines)"
              failed=1
            fi
          done
          exit $failed

      - name: Skill description length (max 1024 chars per skill)
        run: |
          failed=0
          for skill_file in skills/*/SKILL.md; do
            desc=$(awk '/^description:/{found=1; sub(/^description: */,""); print; next} found && (/^---/ || /^[a-z]/){exit} found{print}' "$skill_file" | tr -d '\n')
            len=${#desc}
            echo "$skill_file description: $len chars"
            if [ "$len" -gt 1024 ]; then
              echo "FAIL: $skill_file description exceeds 1024-char limit ($len chars)"
              failed=1
            fi
          done
          exit $failed

      - name: No em dashes in skill files
        run: |
          if grep -rn " — " skills/; then
            echo "FAIL: em dashes found in skill files (use hyphens)"
            exit 1
          fi
          echo "Clean: no em dashes"

      - name: Valid JSON (evals)
        run: |
          python3 -m json.tool evals/evals.json > /dev/null
          echo "evals/evals.json: valid JSON"

      - name: YAML frontmatter present in all SKILL.md files
        run: |
          failed=0
          for skill_file in skills/*/SKILL.md; do
            head -1 "$skill_file" | grep -q "^---$" || {
              echo "FAIL: $skill_file missing YAML frontmatter"
              failed=1
            }
          done
          exit $failed

  eval-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Eval structure and coverage validation
        run: |
          python3 evals/validate_evals.py
